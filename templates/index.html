// 替換原本 <script> 標籤內部的表單提交邏輯（約在程式碼末端）

// 2. 表單非同步動態運算
document.getElementById('consultantForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('loadingSpinner');
    const resultBox = document.getElementById('resultSection');
    const tryonPreview = document.getElementById('tryonPreview');
    const mirrorImage = document.getElementById('mirrorImage');
    const mirrorStyleTag = document.getElementById('mirrorStyleTag');
    const mirrorMakeupTag = document.getElementById('mirrorMakeupTag');
    const mirrorBox = document.getElementById('mirrorBox');
    
    submitBtn.disabled = true;
    spinner.style.display = 'block';
    resultBox.style.display = 'none';
    
    // 自動打包包含照片與下拉選單的表單資料
    const formData = new FormData(this);
    
    try {
        const response = await fetch('/analyze', {
            method: 'POST',
            body: formData
        });
        
        // 如果伺服器回傳狀態碼不是 200~299，直接丟出錯誤
        if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.message || `伺服器回應錯誤碼: ${response.status}`);
        }

        const data = await response.json();
        
        if(data.status === 'success') {
            // 渲染報告內容
            document.getElementById('imageStatus').innerText = data.image_handling;
            
            document.getElementById('colorAnalysis').innerHTML = 
                `<strong>【色彩學大師鑑定報告】</strong><br>` +
                `${data.report.color_analysis}<br>` +
                `<span class="text-muted small d-block mt-1">專業延伸：此季型色盤在光學矩陣下具有高飽和反射率，建議在日常搭配中作為主色。</span>`;
            
            document.getElementById('outfitSuggestion').innerHTML = 
                `<strong>【人體幾何結構與服飾結構提案】</strong><br>` +
                `${data.report.outfit_suggestion}<br>` +
                `<span class="text-muted small d-block mt-1">面料學精要：根據您的體態特徵，應優先挑選挺括、具備高磅數支撐力的織物修飾身材。</span>`;
            
            document.getElementById('makeupTip').innerHTML = 
                `<strong>【高級美學風格妝容定調方針】</strong><br>` +
                `${data.report.makeup_tip}<br>` +
                `<span class="text-muted small d-block mt-1">彩妝實作細節：妝容的核心重點在於「高低明度對比與面部折疊度的重塑」。</span>`;
            
            tryonPreview.innerText = data.report.virtual_tryon_preview;
            
            // 動態配置風格預設圖片 (當使用者沒上傳照片時顯示)
            let modelFallbackUrl = "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1020";
            const finalClothKeywords = data.report.shop_cloth_keywords;
            
            if (finalClothKeywords.includes("極簡")) {
                modelFallbackUrl = "https://images.unsplash.com/photo-1434389677669-e08b4cac3105?q=80&w=1000";
            } else if (finalClothKeywords.includes("老錢")) {
                modelFallbackUrl = "https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=1000";
            } else if (finalClothKeywords.includes("修身")) {
                modelFallbackUrl = "https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=1000";
            }

            // 核心邏輯：若有上傳照片用照片，沒上傳用 fallback 模特兒
            if (uploadedPhotoUrl) {
                mirrorImage.src = uploadedPhotoUrl;
            } else {
                mirrorImage.src = modelFallbackUrl;
            }
            
            // 更新鏡像標籤
            mirrorStyleTag.innerText = "風格：" + (formData.get('style') || "智慧預設風格");
            mirrorMakeupTag.innerText = "妝容：" + (data.report.shop_makeup_keywords.split(' ')[0]) + " 方案";
            
            // 更新導購與影音連結
            document.getElementById('shopClothKeywords').innerText = finalClothKeywords;
            document.getElementById('shopClothBtn').href = data.report.shopee_cloth_url;
            
            document.getElementById('shopMakeupKeywords').innerText = data.report.shop_makeup_keywords;
            document.getElementById('shopMakeupBtn').href = data.report.shopee_makeup_url;
            
            document.getElementById('ytKeywords').innerText = "「" + data.report.youtube_search_keywords + "」";
            document.getElementById('ytJumpBtn').href = data.report.youtube_search_url;
            
            // 更新地圖
            const combinedQuery = "附近 " + data.report.map_search_keywords;
            document.getElementById('mapKeywords').innerText = combinedQuery;
            document.getElementById('mapFrame').src = "https://maps.google.com/maps?q=" + encodeURIComponent(combinedQuery) + "&t=&z=14&ie=UTF8&iwloc=&output=embed";
            
            // 顯示結果區塊並平滑滾動
            resultBox.style.display = 'block';
            resultBox.scrollIntoView({ behavior: 'smooth' });

            // 觸發魔鏡特效
            mirrorBox.style.animation = 'scalePulse 0.6s ease-in-out';
            setTimeout(() => { mirrorBox.style.animation = 'none'; }, 600);
        }
    } catch (error) {
        // 改良後的具體錯誤提示
        alert(`運算矩陣異常：${error.message}\n請檢查後端終端機 (Terminal) 輸出日誌！`);
        console.error("詳細錯誤資訊:", error);
    } finally {
        submitBtn.disabled = false;
        spinner.style.display = 'none';
    }
});
